<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Error {{ code }} | UniAttend</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    body { font-family:'DM Sans',sans-serif; background:#0a0e1a; color:#e2e8f0; min-height:100vh; display:grid; place-items:center; }
    .box { text-align:center; }
    .code { font-family:'Space Mono',monospace; font-size:96px; font-weight:700; color:#3b82f6; line-height:1; }
    .msg  { font-size:20px; margin:16px 0 32px; color:#64748b; }
    a { display:inline-flex; align-items:center; gap:8px; padding:10px 24px; background:#3b82f6; color:#fff; border-radius:8px; text-decoration:none; font-weight:600; }
    a:hover { background:#2563eb; }
  </style>
</head>
<body>
  <div class="box">
    <div class="code">{{ code }}</div>
    <div class="msg">{{ message }}</div>
    <a href="/dashboard">← Go to Dashboard</a>
  </div>
</body>
</html>
